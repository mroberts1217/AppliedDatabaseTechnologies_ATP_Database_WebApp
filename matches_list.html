{% extends "base.html" %}

{% block content %}
<h2 class="mb-3">ATP Matches</h2>
<a href="/matches/new" class="btn btn-success mb-3">Add New Match</a>

<table class="table table-striped table-bordered">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Tournament</th>
            <th>Match #</th>
            <th>Winner</th>
            <th>Loser</th>
            <th>Score</th>
            <th>Round</th>
        </tr>
    </thead>

    <tbody>
    {% for m in matches %}
        <tr>
            <td>{{ m.match_id }}</td>
            <td>{{ m.tourney_id }}</td>
            <td>{{ m.match_num }}</td>
            <td>{{ m.winner_name }}</td>
            <td>{{ m.loser_name }}</td>
            <td>{{ m.score }}</td>
            <td>{{ m.round }}</td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
