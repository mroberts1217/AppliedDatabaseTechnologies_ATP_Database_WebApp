{% extends "base.html" %}
{% block content %}

<h2>Add New Match</h2>

<form method="post" class="mt-4">

    <div class="mb-3">
        <label class="form-label">Tournament</label>
        <select name="tourney_id" class="form-select" required>
            {% for t in tournaments %}
            <option value="{{ t.tourney_id }}">{{ t.tourney_name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Winner</label>
        <select name="winner_id" class="form-select" required>
            {% for p in players %}
            <option value="{{ p.player_id }}">{{ p.player_name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Loser</label>
        <select name="loser_id" class="form-select" required>
            {% for p in players %}
            <option value="{{ p.player_id }}">{{ p.player_name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Score</label>
        <input type="text" name="score" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Round</label>
        <select name="round" class="form-select" required>
            <option value="RR">Round Robin</option>
            <option value="R128">R128</option>
            <option value="R64">R64</option>
            <option value="R32">R32</option>
            <option value="R16">R16</option>
            <option value="QF">Quarterfinal</option>
            <option value="SF">Semifinal</option>
            <option value="F">Final</option>
        </select>
    </div>

    <button class="btn btn-primary">Create Match</button>
</form>

{% endblock %}
