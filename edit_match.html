{% extends "base.html" %}
{% block content %}

<h2>Edit Match</h2>

<form method="post" class="mt-4">

    <div class="mb-3">
        <label class="form-label">Winner</label>
        <select name="winner_id" class="form-select">
            {% for p in players %}
            <option value="{{ p.player_id }}" {% if p.player_id == match.winner_id %}selected{% endif %}>
                {{ p.player_name }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Loser</label>
        <select name="loser_id" class="form-select">
            {% for p in players %}
            <option value="{{ p.player_id }}" {% if p.player_id == match.loser_id %}selected{% endif %}>
                {{ p.player_name }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Score</label>
        <input type="text" name="score" class="form-control" value="{{ match.score }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Round</label>
        <select name="round" class="form-select">
            {% for r in ['RR','R128','R64','R32','R16','QF','SF','F'] %}
            <option value="{{ r }}" {% if r == match.round %}selected{% endif %}>{{ r }}</option>
            {% endfor %}
        </select>
    </div>

    <button class="btn btn-primary">Save Changes</button>
</form>

{% endblock %}
